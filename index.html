<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core Engine V2</title>
	
	
	
	
    <script src='//libtl.com/sdk.js' data-zone='10856902' data-sdk='show_10856902'></script>
	
	
	
	
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #05070a; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; color: white; overflow: hidden;
        }

        .premium-container {
            width: 90%; max-width: 400px;
            padding: 45px 30px;
            background: rgba(15, 23, 42, 0.7);
            border-radius: 60px;
            text-align: center;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        /* সার্কেল বক্স (শুধু ফ্রেম থাকবে, কোন পানি নেই) */
        .liquid-box {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 35px;
            background: #000;
            border-radius: 50%;
            border: 8px solid #111827;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 0 30px rgba(0, 210, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .percent-text {
            font-size: 3.8rem; font-weight: 900;
            letter-spacing: -2px;
            color: #fff;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
        }

        .dev-branding {
            margin-bottom: 35px;
            padding: 10px;
        }

        .dev-title {
            font-size: 0.6rem;
            letter-spacing: 5px;
            color: #475569;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .dev-name {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(180deg, #FFFFFF 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            filter: drop-shadow(0 2px 10px rgba(56, 189, 248, 0.4));
        }

        .sync-btn {
            background: linear-gradient(145deg, #ffffff, #cbd5e1);
            color: #020617;
            border: none;
            width: 100%; padding: 22px;
            border-radius: 25px;
            font-size: 1.1rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .sync-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 210, 255, 0.3);
        }

        .sync-btn:disabled {
            background: #1e293b; color: #475569;
            cursor: not-allowed; box-shadow: none;
        }

        #status-info {
            margin-top: 20px; font-size: 11px;
            text-transform: uppercase; letter-spacing: 2px;
            color: #334155;
        }
    </style>
</head>
<body>

<div class="premium-container" id="main-ui">
    <div style="font-size: 9px; letter-spacing: 6px; color: #38bdf8; margin-bottom: 30px; font-weight: 900;">Nexus Core Engine V2</div>
    
    <div class="liquid-box">
        <!-- এখানে আগে ওয়াটার ডিপ ছিল, এখন শুধু পার্সেন্ট আছে -->
        <div class="percent-text" id="ui-percent">0%</div>
    </div>

    <div class="dev-branding">
        <div class="dev-title">System Architect</div>
        <div class="dev-name">Mamun Hossain</div>
    </div>

    <button class="sync-btn" id="ui-btn" onclick="processStart()">Execute Sync</button>
    <div id="status-info">System Secure</div>
</div>

<script>
    // ১. সিকিউরিটি (BD ব্লক)
    async function checkSecurity() {
        try {
            const res = await fetch('https://api.country.is');
            const data = await res.json();
            if (data.country === 'BD') {
                document.body.innerHTML = '<h1 style="color:red; font-family:Syncopate;">ACCESS DENIED</h1>';
            }
        } catch (e) {}
    }
    checkSecurity();

    // ২. লজিক (শুধু পার্সেন্ট আপডেট হবে)
    let cyclePercent = parseInt(localStorage.getItem('savedPercent')) || 0;
    const percentEl = document.getElementById('ui-percent');
    const btnEl = document.getElementById('ui-btn');
    const statusEl = document.getElementById('status-info');

    function updateUI() {
        if (cyclePercent > 100) cyclePercent = 100;
        
        // শুধু সংখ্যা আপডেট হবে
        percentEl.innerText = cyclePercent + "%";
        localStorage.setItem('savedPercent', cyclePercent);

        // ১০০% হলে বাটন স্থায়ী লক
        if (cyclePercent >= 100) {
            btnEl.disabled = true;
            btnEl.innerText = "System Finalized";
            statusEl.innerText = "Maximum Capacity Reached";
            statusEl.style.color = "#38bdf8";
        }
    }

    function processStart() {
        if (cyclePercent >= 100) return;
        
        btnEl.disabled = true;
        statusEl.innerText = "Syncing with Core...";

        setTimeout(() => {
            if (cyclePercent < 100) {
                btnEl.disabled = false;
                statusEl.innerText = "System Secure";
            }
        }, 10000);

        if (typeof show_10856902 === 'function') {
            show_10856902().then(() => {
                cyclePercent++;
                updateUI();
            }).catch(() => {
                statusEl.innerText = "Connection Refused.";
            });
        }
    }

    // প্রাথমিক লোড
    updateUI();
</script>
</body>
</html>
