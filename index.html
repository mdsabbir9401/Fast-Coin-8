<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Core Engine</title>
  
    <!-- ১. আপনার অ্যাড নেটওয়ার্কের SDK (xxxxxxxx এর জায়গায় আপনার আইডি বসান) -->
    <script 
        src='//libtl.com/sdk.js' 
        data-zone='10856902' 
        data-sdk='show_10856902' 
        onerror="handleInitialError()">
    </script>
    
    <!-- টেলিগ্রাম অফিশিয়াল SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?2" onerror="handleInitialError()"></script>

    <script>
        // ফ্ল্যাগ এবং এরর হ্যান্ডলার (শুরুতে লোড না হলে রিলোড করবে)
        window.appStarted = false; 

        function handleInitialError() {
            if (!window.appStarted) {
                console.log("Script failed. Reloading...");
                location.reload();
            }
        }

        // আপনার আইডি থেকে অটোমেটিক ফাংশন নাম বের করার লজিক
        const getAdFnName = () => {
            const sdkScript = document.querySelector('script[data-sdk]');
            return sdkScript ? sdkScript.getAttribute('data-sdk') : null;
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* আপনার অরিজিনাল ডিজাইন ও সিএসএস */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; width: 100vw; }
        
        /* লোডিং স্ক্রিন ও ফুল ক্লিক লক (সবকিছুর উপরে থাকবে) */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
            pointer-events: all; 
        }
        .loader-spinner {
            width: 50px; height: 50px; border: 3px solid rgba(56, 189, 248, 0.1);
            border-radius: 50%; border-top-color: #38bdf8;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-family: 'Syncopate', sans-serif; font-size: 0.65rem; letter-spacing: 3px; color: #38bdf8; text-transform: uppercase; }

        /* মেইন ইউআই র‍্যাপার */
        #main-wrapper { display: none; width: 100%; max-width: 400px; padding: 20px; }
        
        #block-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center; padding: 30px; }
        .block-msg { font-family: 'Syncopate', sans-serif; font-size: 0.9rem; color: #ef4444; letter-spacing: 2px; line-height: 1.5; }
        
        .engine-container { width: 100%; padding: 35px; text-align: center; border-radius: 45px; background: #0f172a; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 40px 80px rgba(0,0,0,0.6); }
        .header-title { font-family: 'Syncopate', sans-serif; font-size: 0.65rem; letter-spacing: 4px; color: #475569; margin-bottom: 35px; text-transform: uppercase; }
        
        /* প্রগ্রেস সার্কেল ডিজাইন */
        .visualizer { position: relative; width: 260px; height: 260px; margin: 0 auto 35px; }
        svg { width: 260px; height: 260px; transform: rotate(-90deg); }
        circle { fill: none; stroke-width: 14; stroke-linecap: round; }
        .track { stroke: rgba(255,255,255,0.03); }
        .progress-path { stroke: #38bdf8; stroke-dasharray: 754; stroke-dashoffset: 754; transition: stroke-dashoffset 1s ease; filter: drop-shadow(0 0 12px #38bdf8); }
        .core-data { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .percent-val { font-size: 4rem; font-weight: 900; background: linear-gradient(#fff, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .metric-card { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        .metric-label { font-size: 0.6rem; color: #64748b; letter-spacing: 2px; text-transform: uppercase; }
        .metric-value { font-size: 1.5rem; font-weight: 700; color: #f1f5f9; margin-top: 5px; }
        
        .action-trigger { background: #f8fafc; color: #020617; border: none; padding: 22px; width: 100%; border-radius: 20px; font-size: 1rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .action-trigger:disabled { background: #1e293b; color: #475569; cursor: not-allowed; opacity: 0.6; }
        #system-status { margin-top: 20px; font-size: 0.75rem; color: #334155; height: 15px; }
    </style>
</head>
<body>

<!-- লোডিং স্ক্রিন -->
<div id="loading-overlay">
    <div class="loader-spinner"></div>
    <div class="loader-text">Nexus Core Initializing...</div>
</div>

<!-- রিজিওন ব্লক স্ক্রিন -->
<div id="block-screen">
    <div class="block-msg">ACCESS DENIED:<br>UNAUTHORIZED REGION DETECTED</div>
</div>

<!-- আপনার অরিজিনাল ইউআই কন্টেন্ট -->
<div id="main-wrapper">
    <div class="engine-container" id="main-ui">
        <div class="header-title">Nexus Core Engine</div>
        <div class="visualizer">
            <svg viewBox="0 0 280 280">
                <circle class="track" cx="140" cy="140" r="120"></circle>
                <circle id="path" class="progress-path" cx="140" cy="140" r="120"></circle>
            </svg>
            <div class="core-data"><span class="percent-val" id="ui-percent">0%</span></div>
        </div>
        <div class="metric-card">
            <div class="metric-label">SYSTEM DEVELOPER</div>
            <div class="metric-value">Mamun Hossain</div>
        </div>
        <button class="action-trigger" id="ui-btn" onclick="processStart()">Execute Sync</button>
        <div id="system-status">System Standby</div>
    </div>
</div>

<script>
    // চেক করা হচ্ছে সব স্ক্রিপ্ট লোড হয়েছে কি না
    function checkAppStatus() {
        if (window.appStarted) return;

        const adFn = getAdFnName();
        const isAdReady = typeof window[adFn] === 'function';
        const isTgReady = typeof window.Telegram !== 'undefined' && window.Telegram.WebApp;

        if (isAdReady && isTgReady) {
            initNexusCore();
        } else {
            // যদি লোড না হয়, ৫ সেকেন্ড অপেক্ষা করে অটো-রিলোড
            setTimeout(() => {
                if (!window.appStarted) {
                    location.reload();
                }
            }, 5000);
        }
    }

    function initNexusCore() {
        if (window.appStarted) return;

        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation();

        // অরিজিনাল রিজিওন চেক
        securityMonitor().then(() => {
            window.appStarted = true; // সফলভাবে শুরু হওয়ার পর ফ্ল্যাগ সেট
            
            // লোডিং স্ক্রিন সরানো এবং মেইন ইউআই দেখানো
            const loader = document.getElementById('loading-overlay');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                document.getElementById('main-wrapper').style.display = 'block';
                updateUI();
            }, 500);
        }).catch(() => {
            window.appStarted = true;
            document.getElementById('loading-overlay').style.display = 'none';
        });
    }

    // পেজ লোড হলে চেক শুরু হবে
    window.onload = checkAppStatus;

    // অরিজিনাল সিকিউরিটি মনিটর লজিক
    async function securityMonitor() {
        try {
            const res = await fetch('https://api.country.is');
            const data = await res.json();
            return handleRegion(data.country);
        } catch (e) {
            return fetch('https://ipapi.co/json/').then(r => r.json()).then(d => handleRegion(d.country_code));
        }
    }

    function handleRegion(code) {
        if (code === 'BD') {
            document.getElementById('main-wrapper').style.display = 'none';
            document.getElementById('block-screen').style.display = 'flex';
            return Promise.reject();
        }
        return Promise.resolve();
    }

    // আপনার অরিজিনাল প্রগ্রেস লজিক
    let cyclePercent = parseInt(localStorage.getItem('savedPercent')) || 0;
    const ringDash = 754;
    const path = document.getElementById('path');
    const percentEl = document.getElementById('ui-percent');
    const btnEl = document.getElementById('ui-btn');
    const statusEl = document.getElementById('system-status');

    function updateUI() {
        if (cyclePercent > 100) cyclePercent = 100;
        const offset = ringDash - (cyclePercent / 100) * ringDash;
        path.style.strokeDashoffset = offset;
        percentEl.innerText = cyclePercent + "%";
        localStorage.setItem('savedPercent', cyclePercent);

        if (cyclePercent >= 100) {
            btnEl.disabled = true;
            btnEl.innerText = "COMPLETED";
            statusEl.innerText = "System Maximum Capacity Reached";
        }
    }

    function processStart() {
        if (cyclePercent >= 100) return;
        
        btnEl.disabled = true;
        statusEl.innerText = "Synchronizing Data...";

        // আপনার ১০ সেকেন্ড বাটন লক রাখার লজিক
        setTimeout(() => {
            if (cyclePercent < 100) {
                btnEl.disabled = false;
                statusEl.innerText = "System Standby";
            }
        }, 10000);

        const adFn = getAdFnName();
        try {
            if (typeof window[adFn] === 'function') {
                window[adFn]().then(() => {
                    onFinishedSuccess();
                }).catch(() => {
                    statusEl.innerText = "Sync Failed: Ad Not Loaded";
                    btnEl.disabled = false;
                });
            } else {
                statusEl.innerText = "Error: Protocol Offline";
                btnEl.disabled = false;
            }
        } catch (err) {
            statusEl.innerText = "Connection Error";
            btnEl.disabled = false;
        }
    }

    function onFinishedSuccess() {
        if (cyclePercent < 100) {
            cyclePercent++;
            updateUI();
            if (cyclePercent < 100) {
                statusEl.innerText = "Sync Verified Successfully.";
            }
        }
    }
</script>
</body>
</html>
