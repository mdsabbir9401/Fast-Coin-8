<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Core Engine</title>
  
  
  
  
    <script src='//libtl.com/sdk.js' data-zone='11195754' data-sdk='show_11195754'></script>
  
  
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #block-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center; padding: 30px; }
        .block-msg { font-family: 'Syncopate', sans-serif; font-size: 0.9rem; color: #ef4444; letter-spacing: 2px; line-height: 1.5; }
        .engine-container { width: 100%; max-width: 400px; padding: 35px; text-align: center; border-radius: 45px; background: #0f172a; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 40px 80px rgba(0,0,0,0.6); }
        .header-title { font-family: 'Syncopate', sans-serif; font-size: 0.65rem; letter-spacing: 4px; color: #475569; margin-bottom: 35px; text-transform: uppercase; }
        .visualizer { position: relative; width: 260px; height: 260px; margin: 0 auto 35px; }
        svg { width: 260px; height: 260px; transform: rotate(-90deg); }
        circle { fill: none; stroke-width: 14; stroke-linecap: round; }
        .track { stroke: rgba(255,255,255,0.03); }
        .progress-path { stroke: #38bdf8; stroke-dasharray: 754; stroke-dashoffset: 754; transition: stroke-dashoffset 1s ease; filter: drop-shadow(0 0 12px #38bdf8); }
        .core-data { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .percent-val { font-size: 4rem; font-weight: 900; background: linear-gradient(#fff, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .metric-card { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        .metric-label { font-size: 0.6rem; color: #64748b; letter-spacing: 2px; text-transform: uppercase; }
        .metric-value { font-size: 1.5rem; font-weight: 700; color: #f1f5f9; margin-top: 5px; }
        .action-trigger { background: #f8fafc; color: #020617; border: none; padding: 22px; width: 100%; border-radius: 20px; font-size: 1rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .action-trigger:disabled { background: #1e293b; color: #475569; cursor: not-allowed; opacity: 0.6; }
        #system-status { margin-top: 20px; font-size: 0.75rem; color: #334155; height: 15px; }
    </style>
</head>
<body>

<div id="block-screen">
    <div class="block-msg">ACCESS DENIED:<br>UNAUTHORIZED REGION DETECTED</div>
</div>

<div class="engine-container" id="main-ui">
    <div class="header-title">Nexus Core Engine</div>
    <div class="visualizer">
        <svg viewBox="0 0 280 280">
            <circle class="track" cx="140" cy="140" r="120"></circle>
            <circle id="path" class="progress-path" cx="140" cy="140" r="120"></circle>
        </svg>
        <div class="core-data"><span class="percent-val" id="ui-percent">0%</span></div>
    </div>
    <div class="metric-card">
        <div class="metric-label">SYSTEM DEVELOPER</div>
        <div class="metric-value">Mamun Hossain</div>
    </div>
    <button class="action-trigger" id="ui-btn" onclick="processStart()">Execute Sync</button>
    <div id="system-status">System Standby</div>
</div>

<script>


// Telegram Web App SDK ইনিশিয়ালাইজেশন
        const telegramApp = window.Telegram.WebApp;
        telegramApp.ready();
        
        // ক্লোজিং নিশ্চিতকরণ অন রাখা
        telegramApp.enableClosingConfirmation();

        // LocalStorage থেকে প্রোগ্রেস রিড করা
        let progressPercent = parseInt(localStorage.getItem('user_progress_val')) || 0;
        let isProcessing = false;
        let errorTimer;
    
    
    // ১. স্মার্ট সিকিউরিটি মনিটর
    async function securityMonitor() {
        try {
            const res = await fetch('https://api.country.is');
            const data = await res.json();
            handleRegion(data.country);
        } catch (e) {
            fetch('https://ipapi.co/json/').then(r => r.json()).then(d => handleRegion(d.country_code));
        }
    }

    function handleRegion(code) {
        const mainUI = document.getElementById('main-ui');
        const blockUI = document.getElementById('block-screen');
        if (code === 'BD') {
            mainUI.style.display = 'none';
            blockUI.style.display = 'flex';
        } else {
            if (mainUI.style.display === 'none') {
                blockUI.style.display = 'block';
                blockUI.style.display = 'none';
                mainUI.style.display = 'block';
                updateUI();
            }
        }
    }

    setInterval(securityMonitor, 60000);
    securityMonitor();

    // ২. প্রগ্রেস ও মেমোরি লজিক
    let cyclePercent = parseInt(localStorage.getItem('savedPercent')) || 0;
    const ringDash = 754;

    const path = document.getElementById('path');
    const percentEl = document.getElementById('ui-percent');
    const btnEl = document.getElementById('ui-btn');
    const statusEl = document.getElementById('system-status');

    function updateUI() {
        // ১০০% এর বেশি হবে না
        if (cyclePercent > 100) cyclePercent = 100;

        const offset = ringDash - (cyclePercent / 100) * ringDash;
        path.style.strokeDashoffset = offset;
        percentEl.innerText = cyclePercent + "%";
        localStorage.setItem('savedPercent', cyclePercent);

        // ১০০% হয়ে গেলে বাটন স্থায়ীভাবে লক করার শর্ত
        if (cyclePercent >= 100) {
            btnEl.disabled = true;
            btnEl.innerText = "COMPLETED";
            statusEl.innerText = "System Maximum Capacity Reached";
        }
    }

    function processStart() {
        if (cyclePercent >= 100) return; // অতিরিক্ত নিরাপত্তা

        btnEl.disabled = true;
        statusEl.innerText = "Synchronizing Data...";

        // ১০ সেকেন্ড বাটন লক রাখা (আগের নিয়ম অনুযায়ী)
        setTimeout(() => {
            if (cyclePercent < 100) {
                btnEl.disabled = false;
                statusEl.innerText = "System Standby";
            }
        }, 10000);

        try {
            if (typeof show_11195754 === 'function') {
                show_11195754().then(() => {
                    onFinishedSuccess();
                }).catch(() => {
                    statusEl.innerText = "Sync Failed: Ad Not Loaded";
                });
            } else {
                statusEl.innerText = "Error: Protocol Offline";
            }
        } catch (err) {
            statusEl.innerText = "Connection Error";
        }
    }

    function onFinishedSuccess() {
        if (cyclePercent < 100) {
            cyclePercent++;
            updateUI();
            if (cyclePercent < 100) {
                statusEl.innerText = "Sync Verified Successfully.";
            }
        }
    }

    updateUI();
</script>
</body>
</html>
