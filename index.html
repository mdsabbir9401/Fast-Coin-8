<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Neon Green-Aurora Reward Web App</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Monetag SDK -->
    <script src='https://libtl.com/sdk.js' data-zone='10856902' data-sdk='show_10856902'></script>

    <style>
        :root {
            /* ব্যাকগ্রাউন্ড: নিচে নিয়ন গ্রিন এবং উপরে পূর্বের সায়ান ও বেগুনি আভা */
            --bg-gradient: radial-gradient(circle at 10% 10%, rgba(0, 242, 254, 0.25) 0%, transparent 45%),
                           radial-gradient(circle at 50% 100%, rgba(0, 255, 128, 0.25) 0%, transparent 50%), 
                           radial-gradient(circle at 90% 30%, rgba(255, 0, 128, 0.2) 0%, transparent 45%),
                           #03051a; 
            --circle-bg: rgba(3, 5, 26, 0.7); /* ডার্ক গ্লাস ইফেক্ট */
            --accent-pink: #ff007f; 
            --accent-cyan: #00f2fe; 
            --accent-purple: #7c3aed; 
            --text-light: #ffffff;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            height: 100vh;
            overflow-y: auto; 
            user-select: none;
        }

        .app-card {
            width: 90%;
            max-width: 380px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px; 
            margin-bottom: 50px;
        }

        /* गोलाকার প্রোগ্রেস কন্টেইনার */
        .circle-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ভেতরের ডার্ক ফ্রস্টেড গ্লাস বৃত্ত */
        .inner-circle {
            position: absolute;
            width: 230px;
            height: 230px;
            background-color: var(--circle-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5), 
                        inset 0 0 15px rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 0, 128, 0.15); 
        }

        /* পারসেন্টেজ টেক্সট */
        .percentage-text {
            font-size: 60px;
            font-weight: 950;
            color: #ffffff;
            text-shadow: 0 0 12px var(--accent-cyan), 
                         0 0 24px var(--accent-pink);
            font-feature-settings: "tnum";
        }

        /* SVG সার্কুলার প্রোগ্রেস রিং */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 280px;
            height: 280px;
            transform: rotate(-90deg);
            z-index: 1;
        }

        .bg-ring {
            fill: none;
            stroke: rgba(255, 255, 255, 0.03);
            stroke-width: 12px;
        }

        .active-ring {
            fill: none;
            stroke: url(#cyan-pink-gradient);
            stroke-width: 12px;
            stroke-linecap: round;
            stroke-dasharray: 753.98; 
            stroke-dashoffset: 753.98;
            transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.5));
        }

        /* গ্লোয়িং নিয়ন বাটন স্টাইল */
        .action-btn {
            background: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-purple) 100%);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 18px;
            cursor: pointer;
            width: 100%;
            transition: all 0.25s ease;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.3);
            outline: none;
            letter-spacing: 0.5px;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 0, 127, 0.45);
        }

        .action-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .action-btn:disabled {
            background: #1e1e2d;
            color: #4a4a5a;
            box-shadow: none;
            cursor: not-allowed;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        /* প্রিমিয়াম ডেভেলপার ব্যাজ ডিজাইন */
        .developer-badge {
            margin-top: 50px; 
            padding: 16px 36px; 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
            display: inline-block;
            transition: all 0.3s ease;
        }

        .developer-badge:hover {
            border-color: rgba(0, 255, 128, 0.4);
            box-shadow: 0 12px 40px rgba(0, 255, 128, 0.15);
            transform: translateY(-3px);
        }

        .developer-title {
            font-size: 11px;
            font-weight: 800;
            color: rgba(0, 255, 128, 0.9); 
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .developer-name {
            font-size: 22px; 
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(0, 255, 128, 0.45); 
        }

        /* লাইভ আইপি প্রদর্শনীর নতুন সাজানো কন্টেইনার */
        .ip-badge {
            margin-top: 55px; /* আরও কিছুটা নিচে নামানো হয়েছে */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px; /* টেক্সট ও আইপির মধ্যকার স্পেসিং */
        }

        /* উপরে ছোট টেক্সট */
        .ip-title {
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* নিচে বড় গ্লোয়িং আইপি সংখ্যা */
        #user-ip {
            font-size: 20px; /* সাইজ বড় করা হয়েছে */
            font-weight: 800;
            color: var(--accent-cyan);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
            letter-spacing: 0.5px;
        }

        /* ওভারলে ব্যাকগ্রাউন্ড */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 5, 26, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.25s ease;
        }

        /* ফেইলড পপ-আপের লাল ব্যাকগ্রাউন্ড মডাল */
        .error-modal-box {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 26px;
            border-radius: 24px;
            width: 80%;
            max-width: 300px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(185, 28, 28, 0.4); 
            transform: scale(0.9);
            animation: scaleUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* কান্ট্রি ব্লক ওভারলে স্ক্রিন - ব্যাকগ্রাউন্ড সবুজ গ্রেডিয়েন্ট করা হয়েছে */
        .block-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%); 
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

        .block-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 6px solid #ef4444;
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            width: 80%;
            max-width: 320px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .block-box h2 {
            color: #ef4444;
            margin-top: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .block-box p {
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 0;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleUp {
            to { transform: scale(1); }
        }

        .error-modal-box h3 {
            margin-top: 0;
            font-size: 19px;
            color: #ffffff; 
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .error-modal-box p {
            font-size: 14px;
            color: #fca5a5; 
            font-weight: 600;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- মূল অ্যাপ্লিকেশন কন্টেইনার -->
    <div id="app-container" class="app-card">
        
        <!-- गोलाকার প্রোগ্রেস ইন্ডিকেটর -->
        <div class="circle-container">
            <div class="inner-circle">
                <div class="percentage-text" id="percentage-val">0%</div>
            </div>
            
            <svg viewBox="0 0 280 280">
                <defs>
                    <linearGradient id="cyan-pink-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--accent-cyan)" />
                        <stop offset="100%" stop-color="var(--accent-pink)" />
                    </linearGradient>
                </defs>
                <!-- ব্যাকগ্রাউন্ড রিং -->
                <circle class="bg-ring" cx="140" cy="140" r="120" />
                <!-- সক্রিয় প্রোগ্রেস রিং -->
                <circle class="active-ring" id="progress-ring" cx="140" cy="140" r="120" />
            </svg>
        </div>

        <button class="action-btn" id="main-ad-btn" onclick="executeAdProcess()">Show Ad</button>

        <!-- বড় সাইজের প্রিমিয়াম ডেভেলপার ব্যাজ -->
        <div class="developer-badge">
            <div class="developer-title">Developer</div>
            <div class="developer-name">Md Sabbir Hossain</div>
        </div>

        <!-- লাইভ আইপি কন্টেইনার (উপরে টেক্সট ও নিচে বড় নিয়ন আইপি) -->
        <div class="ip-badge">
            <div class="ip-title">Your Live IP</div>
            <div id="user-ip">Detecting...</div>
        </div>
    </div>

    <!-- কান্ট্রি ব্লক স্ক্রিন (বাংলাদেশী ইউজারদের জন্য - ব্যাকগ্রাউন্ড গ্রিন গ্রেডিয়েন্ট) -->
    <div id="block-screen" class="block-overlay">
        <div class="block-box">
            <h2>Access Denied</h2>
            <p>This application is not available in your region. Access has been restricted from Bangladesh.</p>
        </div>
    </div>

    <!-- শর্ত ৫: এরর মডাল (লাল ব্যাকগ্রাউন্ড) -->
    <div id="error-modal" class="overlay">
        <div class="error-modal-box">
            <h3>Ad Unavailable</h3>
            <p>Failed to load ad. Please check your internet connection and try again.</p>
        </div>
    </div>

    <script>
        // কান্ট্রি চেকিং এবং আইপি রিড এপিআই কল
        fetch('https://api.country.is/')
            .then(response => response.json())
            .then(data => {
                // ইউজারের রিয়েল আইপিটি স্ক্রিনে প্রদর্শন করা
                const ipElement = document.getElementById('user-ip');
                if (ipElement) {
                    ipElement.innerText = data.ip;
                }

                if (data.country === 'BD') {
                    // বাংলাদেশ শনাক্ত হলে মূল অ্যাপটি DOM থেকে মুছে ফেলা হবে
                    const appContainer = document.getElementById('app-container');
                    if (appContainer) appContainer.remove();
                    
                    // ব্লক ওভারলে স্ক্রিন চালু করা হবে
                    document.getElementById('block-screen').style.display = 'flex';
                }
            })
            .catch(err => {
                console.warn("Security check bypassed due to network error.");
                const ipElement = document.getElementById('user-ip');
                if (ipElement) {
                    ipElement.innerText = "Unknown";
                }
            });

        // Telegram Web App SDK ইনিশিয়ালাইজেশন
        const telegramApp = window.Telegram.WebApp;
        telegramApp.ready();
        
        // ক্লোজিং নিশ্চিতকরণ অন রাখা
        telegramApp.enableClosingConfirmation();

        // LocalStorage থেকে প্রোগ্রেস রিড করা
        let progressPercent = parseInt(localStorage.getItem('user_progress_val')) || 0;
        let isProcessing = false;
        let errorTimer;

        // প্রথমবার স্ক্রিন আপডেট করা
        refreshUI();

        // UI এবং সার্কেল প্রোগ্রেস আপডেট করার ফাংশন
        function refreshUI() {
            const percentageElement = document.getElementById('percentage-val');
            if (percentageElement) percentageElement.innerText = progressPercent + "%";
            
            const r = 120; 
            const circumference = 2 * Math.PI * r; 
            const offset = circumference - (progressPercent / 100) * circumference;
            const progressRing = document.getElementById('progress-ring');
            if (progressRing) progressRing.style.strokeDashoffset = offset;

            // শর্ত ৬: ১০০% হয়ে গেলে সম্পূর্ণ লক
            if (progressPercent >= 100) {
                const adBtn = document.getElementById('main-ad-btn');
                if (adBtn) {
                    adBtn.disabled = true;
                    adBtn.innerText = "Completed";
                }
                localStorage.setItem('user_progress_val', 100);
            }
        }

        // বাটন ক্লিক অ্যাকশন
        function executeAdProcess() {
            if (isProcessing || progressPercent >= 100) return;

            // ১০ সেকেন্ডের বাটন লক (শর্ত ৬)
            applyButtonLock(10);

            // Monetag SDK চেক
            if (typeof window.show_10856902 === 'function') {
                window.show_10856902().then(() => {
                    // সফল হলে প্রোগ্রেস বৃদ্ধি (শর্ত ৫)
                    if (progressPercent < 100) {
                        progressPercent += 1;
                        localStorage.setItem('user_progress_val', progressPercent);
                        refreshUI();
                    }
                }).catch((err) => {
                    triggerError();
                });
            } else {
                triggerError();
            }
        }

        // লক মেকানিজম (১০ সেকেন্ড)
        function applyButtonLock(seconds) {
            isProcessing = true;
            const adBtn = document.getElementById('main-ad-btn');
            if (adBtn) adBtn.disabled = true;

            let countdown = seconds;
            if (adBtn) adBtn.innerText = `Wait (${countdown}s)`;

            const interval = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(interval);
                    if (progressPercent < 100) {
                        isProcessing = false;
                        if (adBtn) {
                            adBtn.disabled = false;
                            adBtn.innerText = "Show Ad";
                        }
                    } else {
                        if (adBtn) adBtn.innerText = "Completed";
                    }
                } else {
                    if (adBtn) adBtn.innerText = `Wait (${countdown}s)`;
                }
            }, 1000);
        }

        // এরর পপ-আপ (৫ সেকেন্ডের অটো-ক্লোজ)
        function triggerError() {
            const errModal = document.getElementById('error-modal');
            if (errModal) errModal.style.display = 'flex';

            clearTimeout(errorTimer);
            errorTimer = setTimeout(() => {
                if (errModal) errModal.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
